<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <pattern id="leatherTexture" patternUnits="userSpaceOnUse" width="10" height="10">
      <rect width="10" height="10" fill="#d4a574"/>
      <circle cx="2" cy="2" r="0.5" fill="#c4956a" opacity="0.5"/>
      <circle cx="7" cy="5" r="0.3" fill="#c4956a" opacity="0.3"/>
      <circle cx="4" cy="8" r="0.4" fill="#c4956a" opacity="0.4"/>
    </pattern>
  </defs>
  
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#5c3d2e">短款钱包打版图</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#8b6914">比例 1:1 | 单位: mm</text>
  
  <g id="outerShell" transform="translate(50, 80)">
    <rect x="0" y="0" width="220" height="95" rx="5" fill="url(#leatherTexture)" stroke="#8b4513" stroke-width="2"/>
    <text x="110" y="115" text-anchor="middle" font-size="11" fill="#5c3d2e">外皮 220×95mm</text>
  </g>
  
  <g id="innerPocket" transform="translate(50, 220)">
    <rect x="0" y="0" width="220" height="85" rx="5" fill="url(#leatherTexture)" stroke="#8b4513" stroke-width="2"/>
    <rect x="10" y="10" width="80" height="55" fill="none" stroke="#d2691e" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="100" y="10" width="55" height="55" fill="none" stroke="#d2691e" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="165" y="10" width="45" height="55" fill="none" stroke="#d2691e" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="50" y="80" text-anchor="middle" font-size="10" fill="#d2691e">卡位×3</text>
    <text x="110" y="105" text-anchor="middle" font-size="11" fill="#5c3d2e">内皮 220×85mm</text>
  </g>
  
  <g id="billCompartment" transform="translate(320, 80)">
    <rect x="0" y="0" width="200" height="90" rx="5" fill="url(#leatherTexture)" stroke="#8b4513" stroke-width="2"/>
    <line x1="0" y1="75" x2="200" y2="75" stroke="#d2691e" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="100" y="55" text-anchor="middle" font-size="10" fill="#5c3d2e">钞位</text>
    <text x="100" y="110" text-anchor="middle" font-size="11" fill="#5c3d2e">中隔 200×90mm</text>
  </g>
  
  <g id="stitchingMarks" transform="translate(50, 350)">
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#5c3d2e">缝线说明:</text>
    <circle cx="20" cy="25" r="3" fill="#d2691e"/>
    <circle cx="35" cy="25" r="3" fill="#d2691e"/>
    <circle cx="50" cy="25" r="3" fill="#d2691e"/>
    <line x1="20" y1="25" x2="50" y2="25" stroke="#d2691e" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="70" y="30" font-size="10" fill="#5c3d2e">孔间距 2.5mm</text>
    <text x="200" y="30" font-size="10" fill="#5c3d2e">使用 0.8mm 蜡线，双针缝法</text>
  </g>
  
  <g id="dimensions" transform="translate(580, 80)">
    <line x1="0" y1="0" x2="0" y2="95" stroke="#333" stroke-width="1"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#333" stroke-width="1"/>
    <line x1="-5" y1="95" x2="5" y2="95" stroke="#333" stroke-width="1"/>
    <text x="-15" y="50" text-anchor="middle" font-size="10" fill="#333" transform="rotate(-90, -15, 50)">95mm</text>
    
    <line x1="0" y1="110" x2="220" y2="110" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="105" x2="0" y2="115" stroke="#333" stroke-width="1"/>
    <line x1="220" y1="105" x2="220" y2="115" stroke="#333" stroke-width="1"/>
    <text x="110" y="130" text-anchor="middle" font-size="10" fill="#333">220mm</text>
  </g>
</svg>
