<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" width="700" height="450">
  <defs>
    <pattern id="leatherTexture3" patternUnits="userSpaceOnUse" width="10" height="10">
      <rect width="10" height="10" fill="#e0c9a8"/>
      <circle cx="2" cy="2" r="0.5" fill="#d0b998" opacity="0.5"/>
      <circle cx="7" cy="6" r="0.3" fill="#d0b998" opacity="0.3"/>
    </pattern>
  </defs>
  
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#5c3d2e">简约卡包打版图</text>
  <text x="350" y="52" text-anchor="middle" font-size="12" fill="#8b6914">入门首选 | 4卡位</text>
  
  <g id="frontLayer" transform="translate(50, 80)">
    <rect x="0" y="0" width="105" height="75" rx="4" fill="url(#leatherTexture3)" stroke="#8b4513" stroke-width="2"/>
    <text x="52" y="95" text-anchor="middle" font-size="10" fill="#5c3d2e">前层 105×75mm</text>
  </g>
  
  <g id="middleLayer" transform="translate(180, 80)">
    <rect x="0" y="0" width="105" height="75" rx="4" fill="url(#leatherTexture3)" stroke="#8b4513" stroke-width="2"/>
    <path d="M 0 75 L 25 55 L 80 55 L 105 75" fill="none" stroke="#d2691e" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="52" y="95" text-anchor="middle" font-size="10" fill="#5c3d2e">中层 105×75mm</text>
  </g>
  
  <g id="backLayer" transform="translate(310, 80)">
    <rect x="0" y="0" width="105" height="75" rx="4" fill="url(#leatherTexture3)" stroke="#8b4513" stroke-width="2"/>
    <text x="52" y="95" text-anchor="middle" font-size="10" fill="#5c3d2e">后层 105×75mm</text>
  </g>
  
  <g id="assemblyView" transform="translate(480, 70)">
    <rect x="5" y="30" width="105" height="75" rx="4" fill="url(#leatherTexture3)" stroke="#8b4513" stroke-width="1" opacity="0.5"/>
    <rect x="10" y="15" width="105" height="75" rx="4" fill="url(#leatherTexture3)" stroke="#8b4513" stroke-width="1" opacity="0.7"/>
    <rect x="15" y="0" width="105" height="75" rx="4" fill="url(#leatherTexture3)" stroke="#8b4513" stroke-width="2"/>
    <text x="70" y="105" text-anchor="middle" font-size="10" fill="#5c3d2e">叠层示意</text>
  </g>
  
  <g id="stitchingDetails" transform="translate(50, 210)">
    <rect x="0" y="0" width="600" height="200" fill="#fffaf5" rx="8" stroke="#e0d5c5" stroke-width="1"/>
    <text x="20" y="30" font-size="14" font-weight="bold" fill="#5c3d2e">🪡 制作步骤</text>
    
    <text x="20" y="60" font-size="11" fill="#5c3d2e"><tspan font-weight="bold">1. 剪裁：</tspan>裁取3片 105×75mm 皮革，厚度 1.2mm</text>
    <text x="20" y="80" font-size="11" fill="#5c3d2e"><tspan font-weight="bold">2. 处理：</tspan>床面处理剂处理背面，打磨边缘</text>
    <text x="20" y="100" font-size="11" fill="#5c3d2e"><tspan font-weight="bold">3. 划线：</tspan>距离边缘 2mm 画缝合线</text>
    
    <g transform="translate(20, 115)">
      <text x="0" y="0" font-size="11" fill="#5c3d2e"><tspan font-weight="bold">4. 打孔：</tspan>顶部开口处不打孔，其余三边打孔</text>
      <line x1="120" y1="-5" x2="320" y2="-5" stroke="#333" stroke-width="2"/>
      <line x1="120" y1="-5" x2="120" y2="25" stroke="#333" stroke-width="2"/>
      <line x1="320" y1="-5" x2="320" y2="25" stroke="#333" stroke-width="2"/>
      <line x1="120" y1="25" x2="320" y2="25" stroke="#d2691e" stroke-width="2" stroke-dasharray="5,3"/>
      <circle cx="135" cy="-5" r="2" fill="#d2691e"/>
      <circle cx="155" cy="-5" r="2" fill="#d2691e"/>
      <circle cx="285" cy="-5" r="2" fill="#d2691e"/>
      <circle cx="305" cy="-5" r="2" fill="#d2691e"/>
      <circle cx="120" cy="5" r="2" fill="#d2691e"/>
      <circle cx="120" cy="15" r="2" fill="#d2691e"/>
      <circle cx="320" cy="5" r="2" fill="#d2691e"/>
      <circle cx="320" cy="15" r="2" fill="#d2691e"/>
      <text x="220" y="45" text-anchor="middle" font-size="9" fill="#d2691e">虚线为开口，不缝合</text>
    </g>
    
    <text x="20" y="180" font-size="11" fill="#5c3d2e"><tspan font-weight="bold">5. 缝合：</tspan>从左下角起针，双针缝法，顶部回针加固</text>
  </g>
  
  <g id="dimensionMarks" transform="translate(50, 430)">
    <line x1="0" y1="0" x2="105" y2="0" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#333" stroke-width="1"/>
    <line x1="105" y1="-3" x2="105" y2="3" stroke="#333" stroke-width="1"/>
    <text x="52" y="-8" text-anchor="middle" font-size="10" fill="#333">105mm (标准信用卡宽度)</text>
  </g>
</svg>
